<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bgGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050607" />
      <stop offset="45%" stop-color="#0f0218" />
      <stop offset="100%" stop-color="#0a0414" />
    </linearGradient>
    <radialGradient id="purpleGlow" cx="30%" cy="20%" r="40%">
      <stop offset="0%" stop-color="#9b4bff" stop-opacity="0.55" />
      <stop offset="100%" stop-color="#9b4bff" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="pinkGlow" cx="85%" cy="15%" r="30%">
      <stop offset="0%" stop-color="#e85efd" stop-opacity="0.55" />
      <stop offset="100%" stop-color="#e85efd" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="blueGlow" cx="18%" cy="85%" r="35%">
      <stop offset="0%" stop-color="#4d78ff" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#4d78ff" stop-opacity="0" />
    </radialGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#bgGradient)" />
  <rect x="-150" y="-50" width="950" height="950" rx="360" fill="url(#purpleGlow)" filter="url(#blurFilter)" />
  <rect x="1000" y="-180" width="720" height="720" rx="360" fill="url(#pinkGlow)" filter="url(#blurFilter)" />
  <rect x="-150" y="540" width="940" height="640" rx="420" fill="url(#blueGlow)" filter="url(#blurFilter)" />
  <g opacity="0.18">
    <path d="M1340 100C1280 180 1160 130 1130 240C1100 350 1230 390 1290 470C1350 550 1480 610 1540 540C1600 470 1620 320 1560 240C1500 160 1420 60 1340 100Z" fill="#5e2fff" />
    <path d="M420 520C360 620 280 570 220 650C160 730 210 820 300 860C390 900 480 840 560 780C640 720 700 620 660 520C620 420 520 420 420 520Z" fill="#cd2bff" />
  </g>
  <g filter="url(#glowText)">
    <text x="960" y="420" text-anchor="middle" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="46" font-weight="700" letter-spacing="8">SEJA BEM VINDO AO</text>
    <text x="960" y="560" text-anchor="middle" fill="#9b4bff" font-family="Inter, Arial, sans-serif" font-size="160" font-weight="800" letter-spacing="-6">&lt;DEVFOX&gt;</text>
    <text x="960" y="660" text-anchor="middle" fill="#f9f9fb" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="600" letter-spacing="4">DOMINE TECNOLOGIA COM CLAREZA E PRÁTICA.</text>
  </g>
  <defs>
    <filter id="blurFilter" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="80" />
    </filter>
    <filter id="glowText" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="0" stdDeviation="16" flood-color="#8a4dff" flood-opacity="0.35" />
      <feDropShadow dx="0" dy="0" stdDeviation="28" flood-color="#ffffff" flood-opacity="0.12" />
    </filter>
  </defs>
</svg>
